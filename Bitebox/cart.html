<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitebox</title>
    <script src=""></script>
   <script src="https://kit.fontawesome.com/74c76de1ac.js" crossorigin="anonymous"></script>
   <link rel="icon" type="images/x-icon" href="Images/favicon/favicon.ico">
    <link rel="stylesheet" href="css\style.css">

</head>
<body>
    <!--start header section-->
    <header>
        <nav>
            <img src="Images\bitboxlogo.png" alt="logo" width="150px">
            <ul>
               <li><a href="home.html" class="active">Home</a></li>
               <li><a href="menu.html">Menu</a></li>
               <li><a href="bitedeals.html">Bite Deals</a></li>
               <li><a href="cart.html"><i class="fa-solid fa-cart-plus"></i></a></li>
               <li><a href="login.html"><i class="fa-solid fa-right-to-bracket"></i>Login</a></li>
            </ul>
        </nav>
    </header>
<!---End Header section-->


<section class="cart">
    <h2>Your Cart</h2>
    <table>
        <thead>
            <th>Item</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Remove</th>
        </thead>
        <tbody>
            <tr>
                <td class="item">
                   <img src="Images/burger-card1.png">
                   <div>
                     <h4>Cheese Burger</h4>
                     <p>Cheese loaded</p>
                   </div>
                </td>

                <td>
                    ₹299
                </td>

            
                <td>
                    <div class="qty-box">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>

                    </div>
                </td>

                 <td>
                    ₹299
                </td>

                <td>
                    <button class="Remove">X</button>
                </td>
            </tr>


            <tr>
                <td class="item">
                   <img src="Images/pizza-card2.png">
                   <div>
                     <h4>Cheese pizza</h4>
                     <p>Juicy Grilled Burger</p>
                   </div>
                </td>

                <td>
                   ₹199
                </td>

            
                <td>
                    <div class="qty-box">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>

                    </div>
                </td>

                 <td>
                    Rs199
                </td>

                <td>
                    <button  class="Remove">X</button>
                </td>
            </tr>


            <tr>
                <td class="item">
                   <img src="Images/alfredo-card4.png">
                   <div>
                     <h4>Pasta</h4>
                     <p>Cremy white sause</p>
                   </div>
                </td>

                <td>
                   ₹399
                </td>

            
                <td>
                    <div class="qty-box">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>

                    </div>
                </td>

                 <td>
                   ₹399
                </td>

                <td>
                    <button  class="Remove">X</button>
                </td>
            </tr>

            <tr class="grand-total">
                <td colspan="3">Grand Total</td>
                <td>₹897</td>
                <td><button>Proceed</button></td>

            </tr>

        </tbody>
    </table>

</section>

</body>
</html>
